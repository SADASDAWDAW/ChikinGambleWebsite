<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chikin SMP | Gamble Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07070a;
            --sidebar-bg: #0f0f13;
            --blue: #3dceff;
            --blue-hover: rgba(61, 206, 255, 0.15);
            --neon-blue: 0 0 10px rgba(61, 206, 255, 0.5);
            --neon-blue-strong: 0 0 20px rgba(61, 206, 255, 0.7);
            --text-main: #ffffff;
            --text-secondary: #8c8c9e;
            --line-color: #1a1a24;
            --game-bg: #0a0a0e;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Montserrat', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Evrensel Buton ve Input Stilleri */
        .btn-blue { background-color: var(--blue); color: black; padding: 18px; border-radius: 8px; font-weight: 800; border: none; cursor: pointer; font-size: 16px; transition: 0.2s; box-shadow: var(--neon-blue); width: 100%; text-transform: uppercase;}
        .btn-blue:hover { filter: brightness(1.2); }
        .login-btn { background-color: var(--sidebar-bg); color: var(--blue); padding: 10px 25px; border-radius: 8px; font-weight: 600; border: 1px solid var(--line-color); cursor: pointer; transition: 0.2s; }
        .login-btn:hover { border-color: var(--blue); box-shadow: var(--neon-blue); }
        
        input { background: #07070a; border: 2px solid #1a1a24; color: white; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; outline: none; transition: 0.3s; box-sizing: border-box;}
        input:focus { border-color: var(--blue); }

        /* Sol Menü (image_13.png gibi) */
        .sidebar { width: 280px; background-color: var(--sidebar-bg); padding: 30px; border-right: 1px solid var(--line-color); display: flex; flex-direction: column; gap: 30px; }
        .logo-area { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px;}
        .site-logo { width: 70px; height: 70px; background-image: url('https://kullaniciadi.github.io/ChikinGambleWebsite/index.html'); background-size: cover; border-radius: 50%; border: 3px solid var(--blue); box-shadow: var(--neon-blue);} /* image_21.png buraya */
        .site-name { font-size: 26px; font-weight: 800; color: white; letter-spacing: -1px; text-transform: uppercase; }
        .blue-span { color: var(--blue); }
        
        .nav { display: flex; flex-direction: column; gap: 12px; }
        .nav-item { padding: 15px; border-radius: 8px; color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 12px; transition: 0.2s; cursor: pointer;}
        .nav-item:hover { background-color: #16161e; color: var(--text-main); }
        .active { background-color: #1a1a24; color: var(--blue); font-weight: 600; box-shadow: var(--neon-blue); }
        .section-title { font-size: 12px; color: #4e4e5e; text-transform: uppercase; letter-spacing: 1px; margin-top: 15px; }

        /* Ana İçerik Alanı */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { background-color: var(--sidebar-bg); padding: 15px 40px; border-bottom: 1px solid var(--line-color); display: flex; justify-content: flex-end; align-items: center; gap: 15px; }
        .balance-box { background-color: #0a0a0e; padding: 10px 20px; border-radius: 8px; color: var(--blue); border: 1px solid #1a1a24; display: flex; gap: 8px; align-items: center;}

        /* Oyun Sayfaları */
        .game-wrapper { flex: 1; padding: 40px; display: none; }
        .wrapper-active { display: flex; }

        /* Oyun Alanı Tasarımı (image_16.png & image_17.png gibi) */
        .game-area { flex: 1; background-color: var(--sidebar-bg); border-radius: 12px; padding: 30px; border: 1px solid var(--line-color); display: flex; gap: 30px; box-sizing: border-box; }
        .game-controls { width: 400px; display: flex; flex-direction: column; gap: 20px; }
        .game-display { flex: 1; display: flex; justify-content: center; align-items: center; background: radial-gradient(#16161e 0%, #0a0a0e 100%); border-radius: 12px; position: relative; border: 1px solid var(--line-color);}
        
        /* Oyun Başlıkları */
        .game-header { font-size: 24px; font-weight: 800; color: white; display: flex; align-items: center; gap: 10px; margin-bottom: 25px;}

        /* --- Coinflip (image_16.png) --- */
        #coin { width: 250px; height: 250px; background-color: var(--blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(61, 206, 255, 0.4); border: 12px solid #1a1a24; transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55); position: relative;}
        #coin-icon { width: 100px; height: 100px; background-color: #0f0f13; transform: rotate(45deg); border-radius: 10px; }
        #coin-result-text { font-size: 28px; font-weight: 900; position: absolute; text-shadow: var(--neon-blue-strong); text-transform: uppercase; }

        /* --- Dice (image_17.png) --- */
        #dice-num { font-size: 150px; font-weight: 900; color: white; text-shadow: var(--neon-blue-strong); }
        .dice-bar-wrapper { width: 100%; position: absolute; bottom: 40px; padding: 0 40px; box-sizing: border-box; }
        .dice-bar { width: 100%; height: 20px; background-color: #ff4d4d; border-radius: 10px; position: relative; border: 4px solid #1a1a24;}
        .dice-fill { width: 50%; height: 100%; background-color: var(--blue); border-radius: 8px; transition: 0.3s;}
        .dice-handle { width: 30px; height: 30px; background-color: white; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); cursor: pointer; box-shadow: var(--neon-blue-strong); }

        /* --- Mines (image_15.png Tasarımı) --- */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 450px; height: 450px; }
        .mine-tile { background-color: #1a1a24; border-radius: 8px; border: 2px solid #2a2a35; cursor: pointer; transition: 0.2s;}
        .mine-tile:hover { background-color: var(--blue-hover); border-color: var(--blue); }

        /* Donut SMP Tasarım Detayları */
        .control-label { font-size: 14px; color: var(--text-secondary); margin: 0;}
        .status-text { text-align: center; font-weight: 600; min-height: 20px;}
        .log-in-window { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: var(--sidebar-bg); border: 2px solid var(--blue); padding: 40px; border-radius: 15px; box-shadow: var(--neon-blue-strong); z-index: 1000; width: 400px; text-align: center;}
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">
        <div class="site-logo"></div> <div class="site-name">Chikin <span class="blue-span">Gamble</span></div>
    </div>
    
    <div class="nav">
        <div class="section-title">OYUNLAR</div>
        <div class="nav-item" onclick="openGame('mines_wrapper')"><i>🪖</i> Mines</div>
        <div class="nav-item active" onclick="openGame('coinflip_wrapper')"><i>🪙</i> Coinflip</div>
        <div class="nav-item" onclick="openGame('dice_wrapper')"><i>🎲</i> Dice</div>
    </div>
    
    <div class="nav">
        <div class="section-title">TOPLULUK</div>
        <a href="#" class="nav-item"><i>🏆</i> Liderlik Tablosu</a>
        <a href="#" class="nav-item"><i>💬</i> Discord Sunucusu</a>
    </div>
</div>

<div class="main-content">
    <div class="header">
        <div class="balance-box"><i>🍩</i> <span id="money" style="font-weight: 800; font-size: 20px;">1,000</span></div>
        <button class="login-btn">Log In</button>
    </div>

    <div class="game-wrapper wrapper-active" id="coinflip_wrapper">
        <div class="game-area">
            <div class="game-controls">
                <div class="game-header"><i>🪙</i> COINFLIP</div>
                
                <p class="control-label">Bet Amount</p>
                <div style="display: flex; gap: 10px; align-items: center; background-color: #0a0a0e; border: 2px solid #1a1a24; border-radius: 10px; padding-right: 15px;">
                    <input type="number" id="coin-bet" placeholder="1000" style="border: none; flex: 1;">
                    <span style="color: var(--blue); font-weight: 600;">🍩</span>
                </div>
                
                <p class="control-label">Pick a Side</p>
                <div style="display: flex; gap: 15px;">
                    <button style="flex: 1; padding: 15px; background: #0a0a0e; border: 2px solid var(--blue); border-radius: 8px; color: var(--blue); cursor: pointer; font-weight: 600;" onclick="selectCoinSide('Mavi', this)">Head</button>
                    <button style="flex: 1; padding: 15px; background: #0a0a0e; border: 2px solid #1a1a24; border-radius: 8px; color: var(--text-secondary); cursor: pointer; font-weight: 600;" onclick="selectCoinSide('Koyu', this)">Tail</button>
                </div>
                
                <button class="btn-blue" style="margin-top: 20px;" onclick="playCoinflip()">Flip Coin</button>
                <p class="status-text" id="coin-status"></p>
            </div>
            
            <div class="game-display">
                <div id="coin">
                    <div id="coin-icon"></div>
                </div>
                <div id="coin-result-text"></div>
            </div>
        </div>
    </div>

    <div class="game-wrapper" id="dice_wrapper">
        <div class="game-area">
            <div class="game-controls">
                <div class="game-header"><i>🎲</i> DICE</div>
                
                <p class="control-label">Bet Amount</p>
                <div style="display: flex; gap: 10px; align-items: center; background-color: #0a0a0e; border: 2px solid #1a1a24; border-radius: 10px; padding-right: 15px;">
                    <input type="number" id="dice-bet" placeholder="1000" style="border: none; flex: 1;">
                    <span style="color: var(--blue); font-weight: 600;">🍩</span>
                </div>
                
                <button class="btn-blue" style="margin-top: 20px;" onclick="playDice()">Place Bet</button>
                <p class="status-text" id="dice-status"></p>
            </div>
            
            <div class="game-display">
                <div id="dice-num">0</div>
                <div class="dice-bar-wrapper">
                    <div class="dice-bar">
                        <div class="dice-fill"></div>
                        <div class="dice-handle"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="game-wrapper" id="mines_wrapper">
        <div class="game-area">
            <div class="game-controls">
                <div class="game-header"><i>🪖</i> MINES</div>
                <button class="btn-blue">Place Bet (Tasarım)</button>
            </div>
            <div class="game-display">
                <div class="mines-grid">
                    <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div>
                    <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div>
                    <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div>
                    <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div>
                    <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div> <div class="mine-tile"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<div class="log-in-window" id="login_window">
    <p class="control-label" style="font-size: 18px; margin-bottom: 20px; color: white;">Log In</p>
    <p class="control-label" style="text-align: left; margin-bottom: 10px;">Minecraft Username (IGN)</p>
    <input type="text" placeholder="Steve">
    <p class="status-text" style="color: red; margin-top: 10px;">Bu özellik tasarım klonudur, çalışmaz.</p>
</div>

<script>
    let bakiye = 1000;
    let selectedCoinSide = 'Mavi';
    const coin = document.getElementById('coin');
    const coinResultText = document.getElementById('coin-result-text');
    const coinStatus = document.getElementById('coin-status');
    const diceNum = document.getElementById('dice-num');
    const diceStatus = document.getElementById('dice-status');

    // Sayfa değiştirme mantığı
    function openGame(wrapperId) {
        document.querySelectorAll('.game-wrapper').forEach(w => w.classList.remove('wrapper-active'));
        document.getElementById(wrapperId).classList.add('wrapper-active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        // Sol menüde hangi oyunun aktif olduğunu göster
        event.currentTarget.classList.add('active');
    }

    // --- COINFLIP MANTIĞI ---
    function selectCoinSide(side, btn) {
        selectedCoinSide = side;
        // Butonları boya
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => {
            b.style.borderColor = '#1a1a24';
            b.style.color = '#8c8c9e';
        });
        btn.style.borderColor = '#3dceff';
        btn.style.color = '#3dceff';
    }

    function playCoinflip() {
        let miktar = parseInt(document.getElementById('coin-bet').value);
        if(isNaN(miktar) || miktar <= 0 || miktar > bakiye) {
            coinStatus.innerText = "Hata: Yetersiz veya geçersiz miktar!";
            coinStatus.style.color = "#ff4d4d";
            return;
        }

        coinStatus.innerText = "Para dönüyor...";
        coinResultText.innerText = "";
        coin.style.transform = "rotateX(1440deg)"; // Dev gibi dönme

        setTimeout(() => {
            let sonuc = Math.random() < 0.5 ? 'Mavi' : 'Koyu';
            coin.style.transform = "rotateX(0deg)";

            // Renkleri boya
            if(sonuc === 'Mavi') {
                coin.style.backgroundColor = "#2a64fe";
                coin.style.borderColor = "#1a1a24";
            } else {
                coin.style.backgroundColor = "#16161e";
                coin.style.borderColor = "#2a2a35";
            }

            // Kazanma mantığı
            if(selectedCoinSide === sonuc) {
                bakiye += miktar;
                coinResultText.innerText = "WON!";
                coinResultText.style.color = "#4fffc9";
            } else {
                bakiye -= miktar;
                coinResultText.innerText = "LOST!";
                coinResultText.style.color = "#ff4d4d";
            }
            document.getElementById('money').innerText = bakiye.toLocaleString();
            coinStatus.innerText = "Sonuç: " + (sonuc === 'Mavi' ? 'Head' : 'Tail');
        }, 1200);
    }

    // --- DICE MANTIĞI ---
    function playDice() {
        let miktar = parseInt(document.getElementById('dice-bet').value);
        if(isNaN(miktar) || miktar <= 0 || miktar > bakiye) {
            diceStatus.innerText = "Hata: Yetersiz veya geçersiz miktar!";
            diceStatus.style.color = "#ff4d4d";
            return;
        }

        diceStatus.innerText = "Zar atılıyor...";
        diceNum.innerText = "?";

        setTimeout(() => {
            let rolled = Math.floor(Math.random() * 100); // 0-99 zar
            diceNum.innerText = rolled;

            // Donut Dice'ta %50 şans (oran 50'den büyük mü?)
            if(rolled > 50) {
                bakiye += miktar;
                diceNum.style.color = "#4fffc9";
                diceStatus.innerText = `✅ KAZANDIN! (+${miktar} 🍩)`;
            } else {
                bakiye -= miktar;
                diceNum.style.color = "#ff4d4d";
                diceStatus.innerText = `💀 KAYBETTİN! (-${miktar} 🍩)`;
            }
            document.getElementById('money').innerText = bakiye.toLocaleString();
        }, 800);
    }
</script>
</body>
</html>
